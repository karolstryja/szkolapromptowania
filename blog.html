<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — Szkoła Promptowania</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet">
  <link href="css/webflow.css" rel="stylesheet">
  <link href="css/karols-stunning-site-350399.webflow.css" rel="stylesheet">
  <link href="images/favicon.svg" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.svg" rel="apple-touch-icon">
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      if (s) { document.documentElement.setAttribute('data-theme', s); }
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    /* ═══════════════════════════════════════════
       BLOG LAYOUT — stała szerokość, wizualny rytm
       820px kontener, kolorowe bloki, spójna linia
       ═══════════════════════════════════════════ */

    .blog-article {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Hero ── */
    .blog-hero-image {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
    }
    .blog-hero-video {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
      background: #000;
    }

    /* ── Meta ── */
    .blog-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--gray-color);
    }
    .blog-meta-tag {
      background: rgba(255,189,89,0.15);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Title ── */
    .blog-article-title {
      font-family: var(--font-family);
      font-size: 48px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin: 0 0 40px 0;
    }

    /* ── Article body ── */
    .blog-article-body {
      font-family: var(--font-family);
      font-size: 20px;
      line-height: 1.85;
      color: var(--text-primary);
      columns: 2;
      column-gap: 48px;
    }

    /* Elementy które łamią kolumny (na pełną szerokość) */
    .blog-article-body h2,
    .blog-article-body blockquote,
    .blog-article-body pre,
    .blog-article-body .blog-gallery,
    .blog-article-body .blog-video {
      column-span: all;
    }

    /* ── Headings — full width, amber accent ── */
    .blog-article-body h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 56px 0 0 0;
      padding: 0 0 14px 0;
      border-bottom: 2px solid var(--primary);
      color: var(--text-primary);
    }
    .blog-article-body h2 + p,
    .blog-article-body h2 + h3,
    .blog-article-body h2 + ul,
    .blog-article-body h2 + ol {
      margin-top: 24px;
    }

    .blog-article-body h3 {
      font-size: 22px;
      font-weight: 600;
      margin: 36px 0 12px 0;
      color: var(--primary);
    }

    .blog-article-body p {
      margin: 0 0 20px 0;
      opacity: 0.88;
    }
    .blog-article-body strong {
      font-weight: 700;
      opacity: 1;
      color: var(--text-primary);
    }

    /* ── Blockquote — kolorowy blok na pełną szerokość ── */
    .blog-article-body blockquote {
      margin: 44px -40px;
      padding: 36px 48px;
      background: rgba(255,189,89,0.08);
      border-left: 5px solid var(--primary);
      border-radius: 0 16px 16px 0;
      font-size: 22px;
      font-style: italic;
      line-height: 1.5;
      color: var(--text-primary);
      position: relative;
    }
    [data-theme="dark"] .blog-article-body blockquote {
      background: rgba(255,189,89,0.05);
    }
    .blog-article-body blockquote::before {
      content: '\201C';
      position: absolute;
      top: 12px;
      left: 18px;
      font-size: 64px;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--primary);
      opacity: 0.25;
      line-height: 1;
    }
    .blog-article-body blockquote p {
      margin: 0;
      opacity: 0.92;
    }

    /* ── Lists — z kolorowym paskiem po lewej ── */
    .blog-article-body ul,
    .blog-article-body ol {
      margin: 20px 0 28px 0;
      padding: 20px 24px 20px 40px;
      background: rgba(0,0,0,0.02);
      border-left: 3px solid rgba(255,189,89,0.4);
      border-radius: 0 12px 12px 0;
      list-style-position: outside;
    }
    [data-theme="dark"] .blog-article-body ul,
    [data-theme="dark"] .blog-article-body ol {
      background: rgba(255,255,255,0.025);
    }
    .blog-article-body li {
      margin-bottom: 10px;
      opacity: 0.88;
    }
    .blog-article-body li:last-child {
      margin-bottom: 0;
    }
    .blog-article-body li strong {
      color: var(--primary);
    }

    /* ── Code blocks — ciemny blok na pełną szerokość ── */
    .blog-article-body code {
      background: rgba(0,0,0,0.06);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 16px;
    }
    [data-theme="dark"] .blog-article-body code {
      background: rgba(255,255,255,0.08);
    }
    .blog-article-body pre {
      background: #1a1611;
      color: #f5f0eb;
      padding: 32px 48px;
      border-radius: 16px;
      overflow-x: auto;
      margin: 32px -40px;
      font-size: 14px;
      line-height: 1.65;
    }
    .blog-article-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* ── HR — amber dot separator ── */
    .blog-article-body hr {
      border: none;
      height: auto;
      text-align: center;
      margin: 52px 0;
      opacity: 0.4;
    }
    .blog-article-body hr::before {
      content: '● ● ●';
      color: var(--primary);
      font-size: 10px;
      letter-spacing: 12px;
    }

    /* ═══════════════════════════════════════════
       GALLERIES — pełna szerokość kontenera
       ═══════════════════════════════════════════ */
    .blog-gallery {
      margin: 44px 0;
      width: 100%;
    }
    .blog-gallery img {
      border-radius: 12px;
      width: 100%;
      height: auto;
    }
    .blog-gallery figcaption {
      font-size: 13px;
      color: var(--gray-color);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    /* Masonry */
    .gallery-masonry {
      columns: 2;
      column-gap: 14px;
    }
    .gallery-masonry figure {
      margin: 0 0 14px 0;
      break-inside: avoid;
    }

    /* Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .gallery-grid figure { margin: 0; }

    /* Fullwidth — viewport breakout */
    .gallery-fullwidth {
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
    }
    .gallery-fullwidth figure { margin: 0; }
    .gallery-fullwidth img {
      border-radius: 0;
      max-height: 500px;
      object-fit: cover;
    }

    /* Slider — horizontal scroll */
    .gallery-slider {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 12px;
      margin-left: -40px;
      margin-right: -40px;
      padding-left: 40px;
      padding-right: 40px;
    }
    .gallery-slider figure {
      flex: none;
      width: 55%;
      max-width: 560px;
      scroll-snap-align: center;
      margin: 0;
    }
    .gallery-slider::-webkit-scrollbar { height: 4px; }
    .gallery-slider::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 2px; }
    .gallery-slider::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }

    /* ── Video ── */
    .blog-video {
      margin: 44px 0;
      width: 100%;
    }
    .blog-video video {
      width: 100%;
      border-radius: 14px;
      max-height: 500px;
      background: #000;
    }

    /* ═══════════════════════════════════════════
       SCROLL ANIMATIONS
       ═══════════════════════════════════════════ */
    .blog-article-body > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .blog-article-body > .is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Paragraphs and list items keep slight transparency */
    .blog-article-body > p.is-visible { opacity: 1; }
    .blog-article-body > blockquote.is-visible { opacity: 1; }
    .blog-article-body > ul.is-visible,
    .blog-article-body > ol.is-visible { opacity: 1; }

    /* ═══════════════════════════════════════════
       BACK LINK
       ═══════════════════════════════════════════ */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-color);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .blog-back-link:hover { color: var(--primary); }

    /* ═══════════════════════════════════════════
       READING PROGRESS BAR
       ═══════════════════════════════════════════ */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--primary);
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* ═══════════════════════════════════════════
       NAVBAR OVERRIDES
       ═══════════════════════════════════════════ */
    .navbar-brand .image { max-width: none; max-height: none; height: 44px; width: auto; }
    .navbar-brand.w--current { align-self: center !important; }
    .navber-menu-wrap { display: flex; align-items: center; gap: 12px; }
    .primary-btn-wrap { background-color: var(--primary) !important; border-color: var(--primary) !important; }
    .primary-btn-wrap .button-text { color: #09080e !important; text-transform: none !important; }
    .primary-btn-wrap .arrow-01 { filter: brightness(0) !important; }
    [data-theme="dark"] .navbar-no-shadow-container { background-color: var(--bg-body); }
    [data-theme="dark"] .navbar-brand .image { filter: invert(1); }

    /* Theme toggle */
    .theme-toggle { background: none; border: 1.5px solid var(--border-color, #ececec); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: border-color 0.3s; }
    .theme-toggle:hover { border-color: var(--primary); }
    .theme-icon.moon { display: none; }
    [data-theme="dark"] .theme-icon.moon { display: block; }
    [data-theme="dark"] .theme-icon.sun { display: none; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    /* Tablet — single column */
    @media (max-width: 960px) {
      .blog-article-body {
        columns: 1;
      }
    }

    @media (max-width: 768px) {
      .blog-article { padding: 0 18px; }
      .blog-article-title {
        font-size: 32px;
        letter-spacing: -1px;
        margin-bottom: 28px;
      }
      .blog-article-body {
        font-size: 17px;
        line-height: 1.75;
        columns: 1;
      }
      .blog-article-body h2 { font-size: 24px; margin-top: 48px; }
      .blog-article-body h3 { font-size: 19px; }
      .blog-article-body blockquote {
        margin: 32px -18px;
        padding: 24px 24px;
        font-size: 18px;
      }
      .blog-article-body blockquote::before {
        font-size: 44px;
        top: 8px;
        left: 10px;
      }
      .blog-article-body pre {
        margin: 24px -18px;
        padding: 20px 18px;
        border-radius: 0;
      }
      .blog-article-body ul,
      .blog-article-body ol {
        padding: 16px 16px 16px 32px;
      }
      .gallery-masonry { columns: 1; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-slider figure { width: 85%; }
      .gallery-slider { padding-left: 18px; padding-right: 18px; margin-left: -18px; margin-right: -18px; }
      .blog-hero-image,
      .blog-hero-video { border-radius: 12px; max-height: 280px; }
      /* Mniejsza animacja na mobile */
      .blog-article-body > * { transform: translateY(12px); }
    }
  </style>
</head>
<body>

  <div class="reading-progress" id="reading-progress"></div>

  <div class="page-wrapper">
    <!-- Navbar -->
    <div class="navbar">

        <div class="container">
          <div class="navbar-wrapper">
            <div class="navber-wrap">
              <a href="index.html" class="navbar-brand w-nav-brand"><img src="images/logo.svg" loading="lazy" alt="Szkoła Promptowania" class="image"></a>
            </div>
            <nav role="navigation" class="nav-menu-wrapper w-nav-menu">
              <div class="navber-wrapper">
                <ul role="list" class="nav-menu w-list-unstyled">
                  <li><a href="index.html#Home" class="nav-link">start</a><div class="line"></div></li>

                  <li><a href="index.html#Service" class="nav-link">kursy</a><div class="line"></div></li>
                  <li><a href="index.html#Project" class="nav-link">efekty</a><div class="line"></div></li>
                  <li><a href="index.html#Pricing" class="nav-link">cennik</a><div class="line"></div></li>

                    <svg class="theme-icon moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  </button>
                  <a href="index.html#Contact" class="primary-btn-wrap navber w-inline-block">

                      <div class="button-text">zacznij naukę</div>

                    </div>

                </div>
              </div>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <!-- Blog article content -->
    <section class="section" style="padding-top: 140px;">
      <div class="blog-article">
        <a href="index.html#Blog" class="blog-back-link">← wróć do strony głównej</a>
        <div id="blog-meta" class="blog-meta"></div>
        <h1 id="blog-title" class="blog-article-title"></h1>
        <img id="blog-hero" class="blog-hero-image" alt="" style="display:none;">
        <video id="blog-hero-video" class="blog-hero-video" controls playsinline preload="metadata" style="display:none;"></video>
        <div id="blog-content" class="blog-article-body"></div>
      </div>
    </section>

    <!-- Footer minimal -->
    <div class="footer" style="margin-top: 80px;">
      <section class="footer-inner-wrap" style="padding: 40px 0;">
        <div class="w-layout-blockcontainer container v1 w-container">
          <p style="font-family: var(--font-family); font-size: 14px; color: var(--white); opacity: 0.6; margin: 0; text-align: center;">© 2026 Szkoła Promptowania. Wszelkie prawa zastrzeżone.</p>
        </div>
      </section>
    </div>
  </div>

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');

      if (!slug) {
        document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
        return;
      }

      fetch('blog/posts/' + slug + '.md')
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(md) {
          // Parse frontmatter
          var parts = md.split('---');
          var frontmatter = {};
          if (parts.length >= 3) {
            parts[1].trim().split('\n').forEach(function(line) {
              var idx = line.indexOf(':');
              if (idx > 0) {
                var key = line.substring(0, idx).trim();
                var val = line.substring(idx + 1).trim();
                frontmatter[key] = val;
              }
            });
            md = parts.slice(2).join('---').trim();
          }

          // Title & page title
          document.title = (frontmatter.title || slug) + ' — Szkoła Promptowania';
          document.getElementById('blog-title').textContent = frontmatter.title || slug;

          // Hero image or video
          if (frontmatter.image) {
            var imgPath = frontmatter.image.replace(/^\//, '');
            if (imgPath.match(/\.(mp4|webm|mov)$/i)) {
              var heroVid = document.getElementById('blog-hero-video');
              heroVid.src = imgPath;
              heroVid.style.display = 'block';
            } else {
              var heroImg = document.getElementById('blog-hero');
              heroImg.src = imgPath;
              heroImg.alt = frontmatter.title || '';
              heroImg.style.display = 'block';
            }
          }

          // Meta (date + tags)
          var metaHtml = '';
          if (frontmatter.date) {
            var d = new Date(frontmatter.date);
            metaHtml += '<span>' + d.toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>';
          }
          if (frontmatter.tags) {
            var tags = frontmatter.tags.replace(/[\[\]]/g, '').split(',');
            tags.forEach(function(t) {
              metaHtml += '<span class="blog-meta-tag">' + t.trim() + '</span>';
            });
          }
          document.getElementById('blog-meta').innerHTML = metaHtml;

          // Process :::video syntax
          md = md.replace(/:::video\n([\s\S]*?):::/g, function(match, content) {
            var src = content.trim().replace(/^\//, '');
            return '<div class="blog-video"><video src="' + src + '" controls playsinline preload="metadata"></video></div>';
          });

          // Process :::gallery-TYPE syntax
          md = md.replace(/:::gallery-(masonry|grid|fullwidth|slider)\n([\s\S]*?):::/g, function(match, layout, content) {
            var figures = content.trim().split('\n').map(function(line) {
              var parts = line.split('|');
              var src = parts[0].trim().replace(/^\//, '');
              var caption = parts[1] ? parts[1].trim() : '';
              return '<figure><img src="' + src + '" alt="' + caption + '" loading="lazy">' +
                     (caption ? '<figcaption>' + caption + '</figcaption>' : '') + '</figure>';
            }).join('\n');
            return '<div class="blog-gallery gallery-' + layout + '">' + figures + '</div>';
          });

          // Render
          document.getElementById('blog-content').innerHTML = marked.parse(md);

          // Init features
          initScrollAnimations();
          initReadingProgress();
        })
        .catch(function(err) {
          document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
          document.getElementById('blog-content').innerHTML = '<p>Wpis o adresie "' + slug + '" nie istnieje. <a href="index.html#Blog">Wróć do strony głównej</a>.</p>';
        });

      // ── Scroll animations ──
      function initScrollAnimations() {
        var els = document.querySelectorAll('.blog-article-body > *');
        if (!els.length) return;
        if ('IntersectionObserver' in window) {
          var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
              if (e.isIntersecting) {
                e.target.classList.add('is-visible');
                obs.unobserve(e.target);
              }
            });
          }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
          els.forEach(function(el) { obs.observe(el); });
        } else {
          els.forEach(function(el) { el.classList.add('is-visible'); });
        }
      }

      // ── Reading progress ──
      function initReadingProgress() {
        var bar = document.getElementById('reading-progress');
        var article = document.querySelector('.blog-article');
        if (!bar || !article) return;
        window.addEventListener('scroll', function() {
          var top = article.offsetTop;
          var h = article.offsetHeight;
          var wh = window.innerHeight;
          var sy = window.scrollY || window.pageYOffset;
          var p = (sy - top + wh * 0.3) / (h - wh * 0.5);
          bar.style.width = (Math.min(Math.max(p, 0), 1) * 100) + '%';
        }, { passive: true });
      }

      // ── Theme toggle ──
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var c = document.documentElement.getAttribute('data-theme');
          var n = c === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', n);
          localStorage.setItem('theme', n);
        });
      }
    })();
  </script>
